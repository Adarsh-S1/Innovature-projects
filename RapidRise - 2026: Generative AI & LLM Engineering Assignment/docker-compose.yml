version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: research_assistant_db
    environment:
      POSTGRES_DB: research_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: research_assistant_pwd
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgvector_data:
